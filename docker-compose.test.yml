services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor
      POSTGRES_DB: mentor_allocation_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d mentor_allocation_test"]
      interval: 5s
      timeout: 5s
      retries: 10
