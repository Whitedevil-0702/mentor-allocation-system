name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mentor
          POSTGRES_PASSWORD: mentor
          POSTGRES_DB: mentor_allocation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+psycopg://mentor:mentor@localhost:5432/mentor_allocation_test
        run: |
          alembic upgrade head

      - name: Run test suite
        env:
          TEST_DATABASE_URL: postgresql+psycopg://mentor:mentor@localhost:5432/mentor_allocation_test
        run: |
          python -m pytest
